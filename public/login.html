<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - Nama Medical ERP</title>
  <meta name="description" content="Nama Medical ERP — Hospital Management System Login">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap"
    rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #3b82f6;
      --primary-dark: #1d4ed8;
      --bg-dark: #0a0f1e;
      --bg-card: rgba(15, 23, 42, 0.7);
      --border: rgba(148, 163, 184, 0.1);
      --text: #e2e8f0;
      --text-dim: #94a3b8;
    }

    body {
      font-family: 'Tajawal', 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* === Animated Background === */
    .bg-grid {
      position: fixed; inset: 0;
      background-image: 
        linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      from { transform: translate(0, 0); }
      to { transform: translate(60px, 60px); }
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      animation: orbFloat 8s ease-in-out infinite alternate;
    }

    .bg-orb.orb-1 {
      width: 500px; height: 500px;
      background: rgba(59, 130, 246, 0.08);
      top: -150px; right: -100px;
    }

    .bg-orb.orb-2 {
      width: 400px; height: 400px;
      background: rgba(139, 92, 246, 0.06);
      bottom: -100px; left: -100px;
      animation-delay: -4s;
    }

    .bg-orb.orb-3 {
      width: 300px; height: 300px;
      background: rgba(34, 197, 94, 0.04);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -2s;
    }

    @keyframes orbFloat {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-30px) scale(1.05); }
    }

    /* === Login Card === */
    .login-container {
      width: 440px;
      padding: 48px 44px;
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 
        0 32px 80px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      position: relative;
      z-index: 10;
      animation: cardAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(40px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Glow border effect */
    .login-container::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 29px;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), transparent 40%, transparent 60%, rgba(139, 92, 246, 0.2));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .login-container:hover::before { opacity: 1; }

    /* === Logo === */
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
      object-fit: cover;
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3); }
      50% { box-shadow: 0 8px 48px rgba(59, 130, 246, 0.5); }
    }

    .logo h1 {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #60a5fa, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .logo p {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 4px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* === Form === */
    .form-group {
      margin-top: 22px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper .input-icon {
      position: absolute;
      top: 50%; right: 16px;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .form-group input {
      width: 100%;
      height: 52px;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 0 16px 0 16px;
      padding-right: 48px;
      font-size: 15px;
      color: var(--text);
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
      background: rgba(255, 255, 255, 0.06);
    }

    .form-group input:focus + .input-icon,
    .form-group input:not(:placeholder-shown) + .input-icon {
      opacity: 0.8;
    }

    .form-group input::placeholder {
      color: var(--text-dim);
      opacity: 0.4;
    }

    /* === Login Button === */
    .login-btn {
      width: 100%;
      height: 54px;
      margin-top: 30px;
      background: linear-gradient(135deg, #3b82f6, #2563eb, #1d4ed8);
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.5px;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 200%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.6s ease;
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(59, 130, 246, 0.4);
    }

    .login-btn:hover::before { left: 100%; }

    .login-btn:active {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(59, 130, 246, 0.3);
    }

    .login-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    /* === Error === */
    .error-msg {
      margin-top: 18px;
      padding: 14px 18px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: 12px;
      color: #f87171;
      font-size: 14px;
      text-align: center;
      display: none;
      animation: shake 0.4s ease;
      backdrop-filter: blur(4px);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }

    .error-msg.show { display: block; }

    /* === Footer === */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .login-footer p {
      font-size: 12px;
      color: var(--text-dim);
      opacity: 0.5;
    }

    /* === Responsive === */
    @media (max-width: 480px) {
      .login-container {
        width: calc(100vw - 32px);
        padding: 36px 28px;
        border-radius: 20px;
      }
      .logo-icon { width: 56px; height: 56px; }
      .logo h1 { font-size: 22px; }
    }
  </style>
</head>

<body>
  <div class="bg-grid"></div>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="login-container">
    <div class="logo">
      <img src="/img/logo.svg" alt="Nama Medical" class="logo-icon">
      <h1>المركز الطبي</h1>
      <p>MEDICAL ERP SYSTEM</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>اسم المستخدم</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Username" autocomplete="username" autofocus>
          <span class="input-icon">👤</span>
        </div>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
          <span class="input-icon">🔒</span>
        </div>
      </div>
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="login-btn" id="loginBtn">تسجيل الدخول</button>
    </form>
    <div class="login-footer">
      <p>Nama Medical ERP v2.0 — Powered by Advanced Modular Architecture</p>
    </div>
  </div>
  <script src="/js/login.js"></script>
</body>

</html>
